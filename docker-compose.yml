version: '3.8'
services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: your_password
      POSTGRES_DB: chemistry
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:your_password@db:5432/chemistry
      - FRONTEND_URL=http://localhost:3000
    depends_on:
      - db
    command: sh -c "npx prisma migrate deploy && npm run start"

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_BETTER_AUTH_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  pgdata:
